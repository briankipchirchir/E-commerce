<aside class="sidebar" [class.collapsed]="collapsed">

  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon">
      <mat-icon>storefront</mat-icon>
    </div>
    <span class="logo-text" *ngIf="!collapsed">SmartCommerce</span>
  </div>

  <!-- Nav sections -->
  <nav class="sidebar-nav">
    <div class="nav-section" *ngFor="let section of sections">

      <p class="section-title" *ngIf="!collapsed">{{ section.title }}</p>

      <ul class="nav-list">
        <li *ngFor="let item of section.items">
          <a
            class="nav-link"
            [routerLink]="item.route"
            routerLinkActive="active"
            [matTooltip]="collapsed ? item.label : ''"
            matTooltipPosition="right">

            <span class="nav-icon">
              <mat-icon>{{ item.icon }}</mat-icon>
            </span>

            <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>

            <span class="nav-badge" *ngIf="item.badge && !collapsed">
              {{ item.badge }}
            </span>

            <span class="badge-dot" *ngIf="item.badge && collapsed"></span>

          </a>
        </li>
      </ul>

    </div>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer" *ngIf="!collapsed">
    <span class="version">v1.0.0</span>
    <span class="env-badge">DEV</span>
  </div>

</aside>
